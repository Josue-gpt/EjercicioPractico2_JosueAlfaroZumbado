<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="card shadow p-4">

        <h4 class="text-primary mb-3">Consultas Avanzadas</h4>

        <!-- Buscar por nombre -->
        <form th:action="@{/consultas/buscar}" method="get" class="mb-3">
            <input class="form-control mb-2" name="nombre" placeholder="Buscar por nombre">
            <button class="btn btn-primary">Buscar</button>
        </form>

        <!-- Eventos activos -->
        <a class="btn btn-dark mb-3 w-100" th:href="@{/consultas/activos}">
            Eventos Activos
        </a>

        <!-- Contar eventos -->
        <a class="btn btn-dark mb-3 w-100" th:href="@{/consultas/conteo}">
            Contar eventos activos
        </a>

        <p th:if="${total != null}" class="fw-bold">
            Total activos: <span th:text="${total}"></span>
        </p>

        <!-- Usuarios por rol -->
        <form th:action="@{/consultas/usuarios}" method="get" class="mb-3">
            <input class="form-control mb-2" name="rol" placeholder="Ej: ADMIN">
            <button class="btn btn-primary">Buscar usuarios por rol</button>
        </form>

        <!-- RESULTADOS EVENTOS -->
        <table class="table table-hover" th:if="${eventos != null}">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="e : ${eventos}">
                    <td th:text="${e.nombre}"></td>
                    <td th:text="${e.fecha}"></td>
                </tr>
            </tbody>
        </table>

        <!-- RESULTADOS USUARIOS -->
        <table class="table table-hover" th:if="${usuarios != null}">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.nombre}"></td>
                    <td th:text="${u.email}"></td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
