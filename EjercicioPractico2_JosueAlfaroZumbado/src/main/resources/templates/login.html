<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #212529);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 380px;
            border-radius: 15px;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>

<body>

<div class="card shadow-lg p-4 login-card">

    <div class="text-center mb-3">
        <h3 class="fw-bold text-primary">Eventos</h3>
        <p class="text-muted">Iniciar sesión</p>
    </div>

    <!-- MENSAJES -->
    <div th:if="${param.error}" class="alert alert-danger text-center">
        Credenciales incorrectas
    </div>

    <div th:if="${param.logout}" class="alert alert-success text-center">
        Sesión cerrada correctamente
    </div>

    <!-- FORM -->
    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="fw-semibold">Email</label>
            <input class="form-control" type="text" name="email" placeholder="Ingrese su email" required>
        </div>

        <div class="mb-3">
            <label class="fw-semibold">Contraseña</label>
            <input class="form-control" type="password" name="password" placeholder="Ingrese su contraseña" required>
        </div>

        <button class="btn btn-primary w-100">Ingresar</button>

    </form>

</div>

</body>
</html>
